[package]
name = "jals-build"
version.workspace = true
edition.workspace = true

[features]
# On by default: the host `SubprocessToolchain` (JDK discovery + `javac`/`java` spawning) in
# `native.rs`. Everything else — the `Manifest` model, `Invocation` planner, and the pure
# `Toolchain`/`ToolResolver` seam — stays filesystem/process-free, so `--no-default-features` builds a
# `wasm32`-compatible core a future in-browser compiler can implement.
default = ["native"]
native = []

[dependencies]
# The pure `jals.toml` model (`Manifest` and friends) lives in `jals-config`; `jals-build` adds the
# host-only `std::path`-based resolution (`ManifestExt`) on top. `toml` remains for `ManifestError`'s
# `toml::de::Error` field type.
jals-config.workspace = true
toml.workspace = true

[lints]
workspace = true

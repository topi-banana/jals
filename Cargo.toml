[workspace]
resolver = "3"
members = [
  "jals-cli",
  "jals-fmt",
  "jals-lsp",
  "jals-playground",
  "jals-syntax",
  "jals-tests",
]

[workspace.package]
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
anyhow = { version = "1.0.99" }
async-lsp = { version = "0.2.4" }
clap = { version = "4.6.1", features = ["derive"] }
futures = { version = "0.3" }
jals-fmt = { path = "jals-fmt" }
jals-lsp = { path = "jals-lsp" }
jals-syntax = { path = "jals-syntax" }
logos = { version = "0.16.1" }
num-derive = { version = "0.4.2" }
num-traits = { version = "0.2.19" }
rayon = { version = "1" }
rowan = { version = "0.16.1" }
serde = { version = "1.0.219", features = ["derive"] }
serde_json = { version = "1.0" }
text-size = { version = "1.1.1" }
tokio = { version = "1", features = ["rt", "net"] }
toml = { version = "1.1.2" }
tower = { version = "0.5" }
unicode-width = { version = "0.2.1" }
walkdir = { version = "2" }

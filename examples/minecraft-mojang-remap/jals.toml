[package]
name = "minecraft-mojang-remap"
version = "0.1.0"

# Which Minecraft distribution the build script fetches and remaps. Enabling both produces the
# merged jar. Selection is additive, so `--features client` keeps the default `server` (and thus
# merges) unless `--no-default-features` is given.
#
# The release is chosen the same way, except the version features are mutually **exclusive**: at
# most one may be active, and the build script rejects every other combination. `default` therefore
# lists no version at all — the script falls back to the newest release — so `--features 1.20.1`
# selects a version without needing `--no-default-features` to drop a conflicting default. As a
# consequence `--all-features` selects every version at once and always fails.
#
# The keys must be quoted: a bare `1.20.1` is a TOML dotted key, not a feature name. 1.14.4 is the
# oldest entry because Mojang published no official mappings before it.
[features]
default = ["server"]
server = []
client = []
"1.21.11" = []
"1.21.10" = []
"1.21.9" = []
"1.21.8" = []
"1.21.7" = []
"1.21.6" = []
"1.21.5" = []
"1.21.4" = []
"1.21.3" = []
"1.21.2" = []
"1.21.1" = []
"1.21" = []
"1.20.6" = []
"1.20.5" = []
"1.20.4" = []
"1.20.3" = []
"1.20.2" = []
"1.20.1" = []
"1.20" = []
"1.19.4" = []
"1.19.3" = []
"1.19.2" = []
"1.19.1" = []
"1.19" = []
"1.18.2" = []
"1.18.1" = []
"1.18" = []
"1.17.1" = []
"1.17" = []
"1.16.5" = []
"1.16.4" = []
"1.16.3" = []

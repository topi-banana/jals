name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ast-grep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: taiki-e/install-action@v2.83.3
        with:
          tool: ast-grep
      - name: Run ast-grep rule tests
        run: ast-grep test --skip-snapshot-tests
      # `--error` is required to gate CI: a plain `ast-grep scan` exits 0 even when it
      # reports error-severity findings, so without it a rule violation would pass silently.
      - name: Scan the codebase against ast-grep rules
        run: ast-grep scan --error

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  codegen:
    name: generated code up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo run -p xtask -- codegen --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2.83.3
        with:
          tool: nextest
      - run: cargo nextest run --workspace --all-features
      # nextest does not run doctests, so keep them covered with a separate `cargo test --doc`.
      - run: cargo test --workspace --all-features --doc

  taplo:
    name: taplo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: curl -fsSL https://github.com/tamasfe/taplo/releases/latest/download/taplo-linux-x86_64.gz | gzip -d - | install -m 755 /dev/stdin /usr/local/bin/taplo
      - run: taplo fmt --check --diff

  machete:
    name: cargo machete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: taiki-e/install-action@v2.83.3
        with:
          tool: cargo-machete
      - run: cargo machete

  typos:
    name: typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: taiki-e/install-action@v2.83.3
        with:
          tool: typos
      - run: typos

  build:
    name: build (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            target: x86_64-unknown-linux-gnu
            packages: --workspace
          - name: linux-arm
            target: aarch64-unknown-linux-gnu
            packages: --workspace
          # Built as their own package set (no host crate in it), so the `std` features of
          # jals-fmt / jals-lint stay off and `#![no_std]` is enforced for the whole set.
          - name: wasm
            target: wasm32-unknown-unknown
            packages: --package jals-editor --package jals-syntax --package jals-classfile --package jals-hir --package jals-decompile --package jals-fmt --package jals-lint --package jals-storage --package jals-config
          # jals-classpath's HTTP/archive adapters are behind features;
          # `--no-default-features` builds its `no_std + alloc` storage-driven core. jals-build's
          # host half (`SubprocessToolchain`, JDK
          # discovery + spawning) is likewise behind its `native` feature, so its no-`native` core
          # is built here too — the seam a future in-browser compiler implements. Both are
          # portable cores build together here without host features.
          - name: wasm-classpath
            target: wasm32-unknown-unknown
            packages: --package jals-classpath --package jals-build --no-default-features
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install aarch64 cross linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.packages }}

  portable-core:
    name: portable core and feature audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo check -p jals-storage --no-default-features
      - run: cargo check -p jals-classpath --no-default-features
      - run: cargo check -p jals-build --no-default-features
      - run: cargo check -p jals-build --no-default-features --features rhai --target wasm32-unknown-unknown
      - run: cargo check -p jals-classpath --no-default-features --target wasm32-unknown-unknown
      - run: cargo build -p jals-playground --target wasm32-unknown-unknown
      - run: cargo tree -e features -p jals-classpath --no-default-features
      - run: cargo tree -e features -p jals-build --no-default-features

  lsp-binary:
    name: lsp binary (${{ matrix.target }})
    # Per-platform `jals` binaries for the Zed extension's auto-download: the extension asks
    # the GitHub API for the newest of these artifacts on `main` and fetches its zip through
    # nightly.link (GitHub's own artifact-download endpoint requires authentication, even on a
    # public repository). Push-to-main only — the extension never downloads a PR build, so a
    # per-PR five-target build would be wasted.
    if: github.event_name == 'push'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          # Cross-compiled from the arm64 macOS runner (the Xcode toolchain links both archs).
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: lsp-binary-${{ matrix.target }}
      - name: Build the jals binary
        run: cargo build --release --target ${{ matrix.target }} --package jals-cli
      - name: Upload the jals binary
        uses: actions/upload-artifact@v7
        with:
          # The artifact name the extension derives from `zed::current_platform()`; keep the
          # two in sync (`artifact_name` in editors/zed/src/lib.rs).
          name: jals-${{ matrix.target }}
          # Exactly one of the two patterns matches (`jals.exe` on Windows), so the artifact
          # zip holds the binary at its root — which is where the extension expects it.
          path: |
            target/${{ matrix.target }}/release/jals
            target/${{ matrix.target }}/release/jals.exe
          if-no-files-found: error

  zed-extension:
    name: zed extension
    runs-on: ubuntu-latest
    env:
      # The wasi-preview1 reactor adapter used to component-encode the extension, pinned to the
      # wasmtime release Zed's extension host tracks (`wasmtime` in zed-industries/zed's
      # Cargo.toml). Zed loads a wasm *component*, but `cargo build` emits a core module, so the
      # module is adapted into a component with this exact adapter — matching Zed's own build so
      # the artifact loads. Bump this when Zed bumps its wasmtime.
      WASMTIME_VERSION: "36.0.0"
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      # The extension (`editors/zed`) is its own workspace root (excluded from the outer one), so
      # its target dir is `editors/zed/target`.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: editors/zed
      # Installs the wasm-tools binary directly into the tool dir each run, so (unlike a
      # `cargo binstall` keyed off `.crates.toml`) the `rust-cache` step's restored install
      # metadata can't make it skip placing the binary the component-encode step needs.
      - uses: taiki-e/install-action@v2.83.3
        with:
          tool: wasm-tools
      - name: Build the extension (wasm32-wasip1 core module)
        run: cargo build --release --locked --target wasm32-wasip1 --manifest-path editors/zed/Cargo.toml
      - name: Download the wasi-preview1 reactor adapter
        run: |
          curl -fL --retry 3 \
            -o wasi_snapshot_preview1.reactor.wasm \
            "https://github.com/bytecodealliance/wasmtime/releases/download/v${WASMTIME_VERSION}/wasi_snapshot_preview1.reactor.wasm"
      - name: Component-encode the extension
        run: |
          mkdir -p dist
          wasm-tools component new \
            editors/zed/target/wasm32-wasip1/release/zed_jals.wasm \
            --adapt "wasi_snapshot_preview1=wasi_snapshot_preview1.reactor.wasm" \
            -o dist/extension.wasm
          cp editors/zed/extension.toml dist/extension.toml
      - name: Upload the compiled extension
        uses: actions/upload-artifact@v7
        with:
          name: zed-jals-extension
          # The compiled Zed extension: the component `extension.wasm` + its `extension.toml`.
          path: dist/
          if-no-files-found: error

  corpus-reports:
    name: corpus reports
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      # Pinned google-java-format release used to generate the OpenJDK src/ golden corpus.
      GJF_VERSION: "1.35.0"
    steps:
      - uses: actions/checkout@v7
        with:
          # Both corpora: OpenJDK (parse soundness) and google-java-format (fidelity).
          submodules: true
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build the corpus tools
        run: cargo build --release -p jals-tests --bins
      - name: Set up JDK (for google-java-format)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
      - name: Cache the google-java-format jar
        id: gjf-jar
        uses: actions/cache@v6
        with:
          # Immutable per release, so the version alone keys it.
          path: jals-tests/vendor/google-java-format-${{ env.GJF_VERSION }}-all-deps.jar
          key: gjf-jar-${{ env.GJF_VERSION }}
      - name: Download the google-java-format jar
        if: steps.gjf-jar.outputs.cache-hit != 'true'
        run: |
          curl -fL --retry 3 --create-dirs \
            -o "jals-tests/vendor/google-java-format-${GJF_VERSION}-all-deps.jar" \
            "https://github.com/google/google-java-format/releases/download/v${GJF_VERSION}/google-java-format-${GJF_VERSION}-all-deps.jar"
      - name: Resolve the OpenJDK submodule commit
        id: openjdk
        # Reads the gitlink the superproject pins, no submodule history needed.
        run: echo "sha=$(git rev-parse HEAD:jals-tests/sources/openjdk)" >> "$GITHUB_OUTPUT"
      - name: Cache the OpenJDK src/ gjf corpus
        id: corpus-cache
        uses: actions/cache@v6
        with:
          # Generated, never committed (GPL'd OpenJDK derivative). Regenerated only when
          # the submodule pin, the google-java-format version, or the generator changes.
          path: jals-tests/sources/openjdk-gjf
          key: openjdk-gjf-src-${{ env.GJF_VERSION }}-${{ steps.openjdk.outputs.sha }}-${{ hashFiles('jals-tests/scripts/gen-openjdk-gjf.sh') }}
      - name: Generate the OpenJDK src/ gjf corpus
        if: steps.corpus-cache.outputs.cache-hit != 'true'
        env:
          GJF_JAR: jals-tests/vendor/google-java-format-${{ env.GJF_VERSION }}-all-deps.jar
          SUBTREE: src
          JOBS: "2"
        run: jals-tests/scripts/gen-openjdk-gjf.sh 0
      - name: Generate corpus reports
        shell: bash
        run: |
          set -o pipefail
          {
            cargo run --release -p jals-tests --bin jals-tests -- --markdown
            echo
            cargo run --release -p jals-tests --bin jals-golden -- gjf-testdata openjdk-gjf --worst 20 --markdown
          } | tee corpus.md >> "$GITHUB_STEP_SUMMARY"
      - name: Comment corpus reports on PR
        if: always() && github.event_name == 'pull_request' && hashFiles('corpus.md') != ''
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: corpus-reports
          path: corpus.md

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ast-grep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall ast-grep --no-confirm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run ast-grep rule tests
        run: ast-grep test --skip-snapshot-tests
      # `--error` is required to gate CI: a plain `ast-grep scan` exits 0 even when it
      # reports error-severity findings, so without it a rule violation would pass silently.
      - name: Scan the codebase against ast-grep rules
        run: ast-grep scan --error

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  codegen:
    name: generated code up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo run -p xtask -- codegen --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  taplo:
    name: taplo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: curl -fsSL https://github.com/tamasfe/taplo/releases/latest/download/taplo-linux-x86_64.gz | gzip -d - | install -m 755 /dev/stdin /usr/local/bin/taplo
      - run: taplo fmt --check --diff

  machete:
    name: cargo machete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall cargo-machete --no-confirm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: cargo machete

  typos:
    name: typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall typos-cli --no-confirm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: typos

  build:
    name: build (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            target: x86_64-unknown-linux-gnu
            packages: --workspace
          - name: linux-arm
            target: aarch64-unknown-linux-gnu
            packages: --workspace
          # Built as their own package set (no host crate in it), so the `std` features of
          # jals-fmt / jals-lint stay off and `#![no_std]` is enforced for the whole set.
          - name: wasm
            target: wasm32-unknown-unknown
            packages: --package jals-syntax --package jals-classfile --package jals-hir --package jals-decompile --package jals-fmt --package jals-lint --package jals-fs --package jals-config
          # jals-classpath's host I/O (reqwest / git / OsFileTree) is behind its default `native`
          # feature; `--no-default-features` builds its wasm-compatible core (the `Fetcher`/`Git`/
          # `FileTree`-generic resolver), pulling jals-build in for wasm too. It is std-but-wasm (zip
          # needs `std::io`), so it stays out of the `#![no_std]` set above and builds on its own.
          - name: wasm-classpath
            target: wasm32-unknown-unknown
            packages: --package jals-classpath --no-default-features
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install aarch64 cross linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.packages }}

  zed-extension:
    name: zed extension
    runs-on: ubuntu-latest
    env:
      # The wasi-preview1 reactor adapter used to component-encode the extension, pinned to the
      # wasmtime release Zed's extension host tracks (`wasmtime` in zed-industries/zed's
      # Cargo.toml). Zed loads a wasm *component*, but `cargo build` emits a core module, so the
      # module is adapted into a component with this exact adapter — matching Zed's own build so
      # the artifact loads. Bump this when Zed bumps its wasmtime.
      WASMTIME_VERSION: "36.0.0"
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      # The extension (`editors/zed`) is its own workspace root (excluded from the outer one), so
      # its target dir is `editors/zed/target`.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: editors/zed
      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall wasm-tools --no-confirm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build the extension (wasm32-wasip1 core module)
        run: cargo build --release --locked --target wasm32-wasip1 --manifest-path editors/zed/Cargo.toml
      - name: Download the wasi-preview1 reactor adapter
        run: |
          curl -fL --retry 3 \
            -o wasi_snapshot_preview1.reactor.wasm \
            "https://github.com/bytecodealliance/wasmtime/releases/download/v${WASMTIME_VERSION}/wasi_snapshot_preview1.reactor.wasm"
      - name: Component-encode the extension
        run: |
          mkdir -p dist
          wasm-tools component new \
            editors/zed/target/wasm32-wasip1/release/zed_jals.wasm \
            --adapt "wasi_snapshot_preview1=wasi_snapshot_preview1.reactor.wasm" \
            -o dist/extension.wasm
          cp editors/zed/extension.toml dist/extension.toml
      - name: Upload the compiled extension
        uses: actions/upload-artifact@v4
        with:
          name: zed-jals-extension
          # The compiled Zed extension: the component `extension.wasm` + its `extension.toml`.
          path: dist/
          if-no-files-found: error

  corpus-reports:
    name: corpus reports
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      # Pinned google-java-format release used to generate the OpenJDK src/ golden corpus.
      GJF_VERSION: "1.35.0"
    steps:
      - uses: actions/checkout@v7
        with:
          # Both corpora: OpenJDK (parse soundness) and google-java-format (fidelity).
          submodules: true
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build the corpus tools
        run: cargo build --release -p jals-tests --bins
      - name: Set up JDK (for google-java-format)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
      - name: Cache the google-java-format jar
        id: gjf-jar
        uses: actions/cache@v6
        with:
          # Immutable per release, so the version alone keys it.
          path: jals-tests/vendor/google-java-format-${{ env.GJF_VERSION }}-all-deps.jar
          key: gjf-jar-${{ env.GJF_VERSION }}
      - name: Download the google-java-format jar
        if: steps.gjf-jar.outputs.cache-hit != 'true'
        run: |
          curl -fL --retry 3 --create-dirs \
            -o "jals-tests/vendor/google-java-format-${GJF_VERSION}-all-deps.jar" \
            "https://github.com/google/google-java-format/releases/download/v${GJF_VERSION}/google-java-format-${GJF_VERSION}-all-deps.jar"
      - name: Resolve the OpenJDK submodule commit
        id: openjdk
        # Reads the gitlink the superproject pins, no submodule history needed.
        run: echo "sha=$(git rev-parse HEAD:jals-tests/sources/openjdk)" >> "$GITHUB_OUTPUT"
      - name: Cache the OpenJDK src/ gjf corpus
        id: corpus-cache
        uses: actions/cache@v6
        with:
          # Generated, never committed (GPL'd OpenJDK derivative). Regenerated only when
          # the submodule pin, the google-java-format version, or the generator changes.
          path: jals-tests/sources/openjdk-gjf
          key: openjdk-gjf-src-${{ env.GJF_VERSION }}-${{ steps.openjdk.outputs.sha }}-${{ hashFiles('jals-tests/scripts/gen-openjdk-gjf.sh') }}
      - name: Generate the OpenJDK src/ gjf corpus
        if: steps.corpus-cache.outputs.cache-hit != 'true'
        env:
          GJF_JAR: jals-tests/vendor/google-java-format-${{ env.GJF_VERSION }}-all-deps.jar
          SUBTREE: src
          JOBS: "2"
        run: jals-tests/scripts/gen-openjdk-gjf.sh 0
      - name: Generate corpus reports
        shell: bash
        run: |
          set -o pipefail
          {
            cargo run --release -p jals-tests --bin jals-tests -- --markdown
            echo
            cargo run --release -p jals-tests --bin jals-golden -- gjf-testdata openjdk-gjf --worst 20 --markdown
          } | tee corpus.md >> "$GITHUB_STEP_SUMMARY"
      - name: Comment corpus reports on PR
        if: always() && github.event_name == 'pull_request' && hashFiles('corpus.md') != ''
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: corpus-reports
          path: corpus.md

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  codegen:
    name: generated code up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo run -p xtask -- codegen --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  taplo:
    name: taplo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: curl -fsSL https://github.com/tamasfe/taplo/releases/latest/download/taplo-linux-x86_64.gz | gzip -d - | install -m 755 /dev/stdin /usr/local/bin/taplo
      - run: taplo fmt --check --diff

  machete:
    name: cargo machete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall cargo-machete --no-confirm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: cargo machete

  typos:
    name: typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall typos-cli --no-confirm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: typos

  build:
    name: build (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            target: x86_64-unknown-linux-gnu
            packages: --workspace
          - name: linux-arm
            target: aarch64-unknown-linux-gnu
            packages: --workspace
          - name: wasm
            target: wasm32-unknown-unknown
            packages: --package jals-syntax
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install aarch64 cross linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.packages }}

  parse-soundness:
    name: parse soundness
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run parse-soundness check
        shell: bash
        run: |
          set -o pipefail
          cargo run --release -p jals-tests --bin jals-tests -- --markdown | tee soundness.md >> "$GITHUB_STEP_SUMMARY"
      - name: Comment parse rate on PR
        if: always() && github.event_name == 'pull_request' && hashFiles('soundness.md') != ''
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: parse-soundness
          path: soundness.md

  golden-fidelity:
    name: google-java-format fidelity
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      # Only the small google-java-format corpus is needed — not the huge OpenJDK
      # submodule — so init just that one shallowly instead of `submodules: true`.
      - name: Check out the google-java-format corpus
        run: git submodule update --init --depth 1 jals-tests/sources/google-java-format
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run formatter-fidelity check
        shell: bash
        run: |
          set -o pipefail
          cargo run --release -p jals-tests --bin jals-golden -- gjf-testdata --markdown \
            | tee golden.md >> "$GITHUB_STEP_SUMMARY"
      - name: Comment fidelity on PR
        if: always() && github.event_name == 'pull_request' && hashFiles('golden.md') != ''
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: golden-fidelity
          path: golden.md

id = "jals"
name = "jals"
version = "0.1.0"
schema_version = 1
authors = ["topi-banana <topi87.oke@gmail.com>"]
description = "Java language support powered by the jals language server (`jals lsp`)."
repository = "https://github.com/topi-banana/jals"

# jals ships no grammar of its own: it attaches to Zed's `Java` language (provided by the
# separate "Java" extension) and starts the `jals` binary's stdio language server (`jals lsp`).
# The `languages` value must match the `name` in the Java language's `config.toml`.
[language_servers.jals]
name = "jals"
languages = ["Java"]

[grammars.java]
repository = "https://github.com/tree-sitter/tree-sitter-java"
commit = "94703d5a6bed02b98e438d7cad1136c01a60ba2c"

[grammars.properties]
repository = "https://github.com/tree-sitter-grammars/tree-sitter-properties"
commit = "579b62f5ad8d96c2bb331f07d1408c92767531d9"

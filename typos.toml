# Configuration for `typos` (https://github.com/crate-ci/typos).

[files]
# `jals-tests/sources/` holds vendored upstream code (the openjdk submodule)
# used only as parser test fixtures; don't spell-check third-party code.
extend-exclude = ["jals-tests/sources/"]

[default.extend-words]
# Unicode general category short names appear in lexer regexes (e.g. \p{Nd});
# they are not typos of English words such as "And".
Nd = "Nd"
# `fo` is a placeholder for a partially-typed member name in completion docs
# (e.g. `receiver.fo`), not a misspelling of "for"/"of".
fo = "fo"
# `ifle` is the JVM bytecode opcode "if less than or equal" (JVMS §6),
# modelled as the `Ifle` instruction variant; not a misspelling of "file".
ifle = "ifle"
Ifle = "Ifle"
# `mis` is the hyphenated prefix in prose like `mis-read` / `mis-structured` /
# `mis-associating` (jals-decompile docs); not a misspelling of "miss"/"mist".
mis = "mis"
